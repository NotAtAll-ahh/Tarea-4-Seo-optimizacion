<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            color: #111;
        }

        section {
            padding: 24px;
            margin: 16px;
            background: #fff;
            border-radius: 10px;
        }

        h2 {
            margin-top: 0;
        }

        .hero img,
        .banners img {
            width: 100%;
            max-height: 280px;
            object-fit: cover;
            border-radius: 8px;
        }

        .grid {
            display: grid;
            gap: 12px;
        }

        .galeria-grid {
            grid-template-columns: repeat(2, minmax(120px, 1fr));
        }

        .iconos-grid {
            grid-template-columns: repeat(3, minmax(70px, 110px));
        }

        .galeria-grid img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 8px;
        }

        .iconos-grid img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 50%;
        }

        .banners-grid {
            grid-template-columns: 1fr;
        }

        @media (max-width: 680px) {
            .galeria-grid {
                grid-template-columns: 1fr;
            }

            .iconos-grid {
                grid-template-columns: repeat(3, minmax(60px, 1fr));
            }
        }
    </style>
</head>
<body>
    <section class="hero">
        <h2>Hero</h2>
        <img src="01_Fotografia_Paisaje.jpg" alt="Imagen principal de portada" fetchpriority="high" loading="eager" width="1280" height="853">
    </section>

    <section class="galeria">
        <h2>Galeria</h2>
        <div class="grid galeria-grid">
            <img src="02_Retrato.jpg" alt="Foto de galeria 1" width="800" height="1200">
            <img src="05_Infografia.webp" alt="Foto de galeria 2" width="800" height="600">
            <img src="07_Animacion_simple.gif" alt="Foto de galeria 3" width="800" height="600">
            <img src="08_Imagen_producto.webp" alt="Foto de galeria 4" width="800" height="600">
        </div>
    </section>

    <section class="iconos">
        <h2>Iconos</h2>
        <div class="grid iconos-grid">
            <img src="03_Logotipo.webp" alt="Icono visual 1" width="200" height="200" loading="lazy">
            <img src="04_Icono_nav.png" alt="Icono visual 2" width="200" height="200" loading="lazy">
            <img src="09_Icono_escalable.svg" alt="Icono visual 3" width="200" height="200" loading="lazy">
        </div>
    </section>

    <section class="banners">   
        <h2>Banners</h2>
        <div class="grid banners-grid">
            <img src="06_Banner_publicitario.webp" alt="Banner promocional 1" width="1200" height="400" loading="lazy">
            <img src="10_Fotografia_alta_calidad.avif" alt="Banner promocional 2" width="1200" height="800" loading="lazy">
        </div>
    </section>
</body>
</html>
